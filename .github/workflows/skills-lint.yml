name: skills-lint
on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  skills-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: python -m pip install --upgrade pip pyyaml jsonschema
      - name: Validate skills
        run: python ci/skills/validate_skills.py
