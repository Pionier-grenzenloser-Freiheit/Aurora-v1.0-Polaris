$schema: "http://json-schema.org/draft-07/schema#"
title: "SKILL.md Frontmatter Schema"
type: "object"
additionalProperties: false
required:
  - id
  - name
  - description
  - version
  - execution
properties:
  id:
    type: "string"
    minLength: 1
  name:
    type: "string"
    minLength: 1
    maxLength: 64
    pattern: "^[a-z0-9-]+$"
  description:
    type: "string"
    minLength: 1
  version:
    type: "string"
    pattern: "^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-[0-9A-Za-z-]+(?:\\.[0-9A-Za-z-]+)*)?(?:\\+[0-9A-Za-z-]+(?:\\.[0-9A-Za-z-]+)*)?$"
  execution:
    type: "object"
    additionalProperties: false
    required:
      - mode
    properties:
      mode:
        type: "string"
        enum: ["local", "cloud"]
  allowed_tools:
    type: "array"
    items:
      type: "string"
      pattern: "^tool\\.[a-z0-9_]+$"
  rbac:
    type: "object"
    additionalProperties: true
  inputs:
    type: "array"
    items:
      type: "object"
      additionalProperties: false
      required: ["name", "type", "required"]
      properties:
        name: { "type": "string", "minLength": 1 }
        type: { "type": "string", "minLength": 1 }
        required: { "type": "boolean" }
        description: { "type": "string" }
  outputs:
    type: "array"
    items:
      type: "object"
      additionalProperties: false
      required: ["name", "type"]
      properties:
        name: { "type": "string", "minLength": 1 }
        type: { "type": "string", "minLength": 1 }
        description: { "type": "string" }
  x-aurora:
    type: "object"
    additionalProperties: true
